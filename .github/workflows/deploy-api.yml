name: Deploy Container API

on:
  push:
    branches:
      - main
    paths:
      - 'packages/server-container/**'
      - 'packages/shared/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/baby-tracker-api
  CONTAINER_APP_NAME: baby-tracker-app-container
  RESOURCE_GROUP: rg-fan-holdings

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build, Push, Deploy

    # Required for GITHUB_TOKEN to push to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Build & push Docker image ───────────────────────────────────────────

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build context is the monorepo root so the Dockerfile can reach packages/shared
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server-container/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Layer cache via GHCR — keeps CI builds fast
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ── Deploy to Azure Container Apps ──────────────────────────────────────

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Create a new revision of the Container App pointing at the just-pushed image.
      # Pinning to the commit SHA (not :latest) guarantees reproducibility —
      # rolling back is `az containerapp revision activate --name <prev-revision>`.
      - name: Update Container App
        run: |
          az containerapp update \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_NAME }}:${{ github.sha }}"
